<!DOCTYPE html>
<html>
<head>
    <title>Health Insurance Cost Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border: 1px solid #200c0c;
            border-radius: 10px;
        }
        .form-container input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 20px 0;
            display: inline-block;
            border: 1px solid #bae8f4;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .form-container input[type="submit"] {
            background-color: #8e5cc4;
            color: white;
            border: none;
        }
        .form-container input[type="submit"]:hover {
            background-color: #7b4eb1;
        }
        .result {
            font-size: 1.5em;
            color: #845edc;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Health Insurance Cost Prediction</h2>
        <form action="/predict" method="post">
            <label for="age">Age:</label>
            <input type="number" name="age" required>
            
            <label for="bmi">BMI:</label>
            <input type="number" step="0.01" name="bmi" required>
            
            <label for="children">Number of Children:</label>
            <input type="number" name="children" required>
            
            <label for="smoker">Smoker:</label>
            <select name="smoker" required>
            <option value="" >Select</option>
            <option value="yes" r>Yes</option>
            <option value="no">No</option>
            </select>
            <br>
            <br>
            <div class="form-group">
            <label>Gender:</label>

            <div class="radio-group">
                <label><input type="radio" name="gender" value="male" required> Male</label>
                <label><input type="radio" name="gender" value="female" required> Female</label>
            </div>
    </div>
            
            <br>
            <label for="region">Region:</label>
            <select name="region" required>
                <option value="">Select</option>
                <option value="southeast">southeast</option>
                <option value="southwest">southwest</option>
                <option value="northeast">northeast</option>
                <option value="northwest">northwest</option>
            </select>
            <br>
            <br>
            <input type="submit" value="Predict">
        </form>
        {% if prediction %}
        <div class="result-box">
            <h3>Estimated Insurance Cost</h3>
            <p>$ {{ prediction }}</p>
        </div>
        {% endif %}
        <spline-viewer class="bgshape" url="https://prod.spline.design/vNLRHzFcm1ZdIw2x/scene.splinecode"></spline-viewer>

    </div>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.69/build/spline-viewer.js"></script>
    
</body>
</html>
